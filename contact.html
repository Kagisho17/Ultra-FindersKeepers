<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindersKeepers | Contact</title>
	
	<script>
(function () {
    const savedMode = localStorage.getItem("mode");
    if (savedMode === "dark") {
        document.documentElement.classList.add("dark");
    }
})();
</script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header / Navbar -->
    <header>
        <div class="container header-container">
            <div class="logo-container">
                <img src="spu-logo.png" alt="FindersKeepers Logo" class="logo">
                <span>FindersKeepers</span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="report.html">Report Item</a></li>
                    <li><a href="items.html">Items List</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
            <button id="modeToggle">🌙</button>
        </div>
    </header>

    <!-- Contact Form Section -->
    <section class="contact-section">
        <h2>Contact Us</h2>
        <p>Have questions or suggestions? Fill out the form below and we’ll get back to you!</p>
        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="name">Name*</label>
                <input type="text" id="name" placeholder="Your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email*</label>
                <input type="email" id="email" placeholder="Your email address" required>
            </div>

            <div class="form-group">
                <label for="subject">Subject*</label>
                <input type="text" id="subject" placeholder="Subject" required>
            </div>

            <div class="form-group">
                <label for="message">Message*</label>
                <textarea id="message" placeholder="Your message" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
        <p id="contactSuccess" class="success-msg"></p>
    </section>

    <footer>
        <p>&copy; 2026 FindersKeepers. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
